upstream django_app {
    server backend:8000;
}

upstream vue_app {
    server frontend:8080;
}

server {
    listen 80;

    # File Media di Django
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 30d;
    }

    # File Statici di Django (Admin)
    location /static/ {
        alias /usr/share/nginx/html/static/; # Dovrai aggiungere anche questo volume se vuoi l'admin stilizzato
        expires 30d;
    }

    # API Django
    location /api/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Websocket
    location /ws/ {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend Vue
    location / {
        proxy_pass http://vue_app;
        proxy_set_header Host $host;
    }
}
