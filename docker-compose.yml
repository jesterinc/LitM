services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lotmdb
      POSTGRES_USER: jester
      POSTGRES_PASSWORD: jester
    networks:
      - lotm_network

  redis:
    image: redis:7-alpine
    networks:
      - lotm_network

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_DB: lotmdb
      POSTGRES_USER: jester
      POSTGRES_PASSWORD: jester
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: 'supersecretkeyfordevelopment'
      DJANGO_DEBUG: '1'
    networks:
      - lotm_network

  celeryworker:
    build: ./backend
    command: celery -A config worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      POSTGRES_DB: lotmdb
      POSTGRES_USER: jester
      POSTGRES_PASSWORD: jester
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    networks:
      - lotm_network

  frontend:
      build:
        context: ./frontend
        target: development-stage # Se hai più stage, altrimenti basta build: ./frontend
      volumes:
        - ./frontend/src:/app/src
        - ./frontend/public:/app/public
        - /app/node_modules # Importante: usa i node_modules del container
      ports:
        - "8080:8080"
      environment:
        - CHOKIDAR_USEPOLLING=true
      networks:
        - lotm_network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - media_volume:/usr/share/nginx/html/media
    depends_on:
      - frontend
      - backend
    networks:
      - lotm_network

volumes:
  postgres_data:
  media_volume:

networks:
  lotm_network:
    driver: bridge
